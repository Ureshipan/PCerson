services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ../state/runtime/ollama:/root/.ollama
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ../state/runtime/mqtt:/mosquitto/data
    restart: unless-stopped

