services:
  ollama:
    image: ollama/ollama:latest
    gpus: all
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    ports:
      - "11434:11434"
    volumes:
      - ../state/runtime/ollama:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ../state/runtime/qdrant:/qdrant/storage
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ../state/runtime/mqtt:/mosquitto/data
    restart: unless-stopped
